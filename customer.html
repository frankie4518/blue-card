<!DOCTYPE html>
<meta charset="UTF-8">
<html lang="en">
<head>
  <title>Customer Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
  <script src="auth.js"></script>
  <script src="api.js"></script>
</head>
<body onload="initCustomerPage();">

<header>
  <a href="staff.html" class="btn-outline">← Back</a>
</header>

<div class="container">
  <div class="card">
    <h2 id="custName"></h2>
    <p id="custEmail"></p>
  </div>

  <div class="card">
    <h2>Notes Timeline</h2>
    <div id="notes"></div>
    <textarea id="newNote" class="note-box" placeholder="Write a note…"></textarea>
    <button class="btn" onclick="addNote()">Add Note</button>
  </div>
</div>

<script>
  let customerId = null;
  let currentCustomer = null;

  async function initCustomerPage() {
    requireLogin();
    const params = new URLSearchParams(window.location.search);
    customerId = params.get("id");
    if (!customerId) {
      window.location.href = "staff.html";
      return;
    }

    try {
      currentCustomer = await api.getCustomer(customerId);
      document.getElementById("custName").textContent = currentCustomer.name;
      document.getElementById("custEmail").textContent = currentCustomer.email;
      renderNotes(currentCustomer.notes || []);
    } catch (e) {
      alert("Error loading customer");
    }
  }

  function renderNotes(notes) {
    const container = document.getElementById("notes");
    container.innerHTML = "";
    notes.forEach(n => {
      const div = document.createElement("div");
      div.className = "note";
      div.innerHTML = `<strong>${n.time}</strong><br>${n.text}`;
      container.appendChild(div);
    });
  }

  async function addNote() {
    const text = document.getElementById("newNote").value.trim();
    if (!text) return;

    try {
      await api.addNote(customerId, text);
      const updated = await api.getCustomer(customerId);
      currentCustomer = updated;
      renderNotes(updated.notes || []);
      document.getElementById("newNote").value = "";
    } catch (e) {
      alert("Error adding note");
    }
  }
</script>

</body>
</html>
