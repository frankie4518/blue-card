<!DOCTYPE html>
<html>
<head>
  <title>Customer Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- include style.css -->
  <script src="auth.js"></script>
  <script src="data.js"></script>
</head>

<body onload="requireLogin(); loadCustomer();">

<header>
  <a href="staff.html" class="btn-outline">← Back</a>
</header>

<div class="container">

  <div class="card">
    <h2 id="custName"></h2>
    <p id="custEmail"></p>
  </div>

  <div class="card">
    <h2>Notes Timeline</h2>
    <div id="notes"></div>
    <textarea id="newNote" class="note-box" placeholder="Write a note…"></textarea>
    <button class="btn" onclick="addNote()">Add Note</button>
  </div>

</div>

<script>
  function loadCustomer() {
    const id = new URLSearchParams(window.location.search).get("id");
    const c = customers[id];

    document.getElementById("custName").textContent = c.name;
    document.getElementById("custEmail").textContent = c.email;

    renderNotes(c);
  }

  function renderNotes(c) {
    const container = document.getElementById("notes");
    container.innerHTML = "";
    c.notes.forEach(n => {
      const div = document.createElement("div");
      div.className = "note";
      div.innerHTML = `<strong>${n.time}</strong><br>${n.text}`;
      container.appendChild(div);
    });
  }

  function addNote() {
    const id = new URLSearchParams(window.location.search).get("id");
    const c = customers[id];
    const text = document.getElementById("newNote").value;
    if (!text) return;

    c.notes.push({ text, time: new Date().toLocaleString() });
    document.getElementById("newNote").value = "";
    renderNotes(c);
  }
</script>

</body>
</html>
